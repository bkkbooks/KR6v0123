body:
  text: 論高麗再雕藏中所見的契丹藏韓國大真大學校教授柳富鉉一序言契丹大藏經以下稱契丹藏開雕於遼興宗重熙年間至道宗清寧五年完成了大藏原有的卷經典的雕版工作又陸續補刊了一些經典續入大藏至道宗咸雍年間帙大藏全部刊雕完畢這已是學術界公認的事實高麗文宗十七年契丹藏第一次進入高麗國這比高麗初雕大藏經的刊行早了年又於文宗二六年肅宗四年睿宗二年數度被引入高麗國至刊雕高麗再雕大藏經以下稱再雕藏時已被用作對校本再雕藏的對校工作由守其負責他在高麗國新雕大藏校正別録以下簡稱校正別録中明確寫道再雕藏的校勘以契丹藏為主要底本正因有了校正別録妻木植良之後的多數學者認為契丹藏是謬誤甚少的優秀的版本值得注意的是對契丹藏的這一評價主要依據是收録在校正別録中的函部經典在以往的研究成果中對收録在再雕藏中的契丹藏的收録規模程度與性質鮮有論及如果不弄清這些問題就無法對契丹藏進行客觀的評價為了能對契丹藏進行客觀的評價本文對再雕藏中與契丹藏有關的所有校勘記録逐一進行勘查以便分析考察收録在再雕藏中的契丹藏的性質二再雕大藏經中與契丹藏有關的校勘記録目前學界所知道的再雕大藏經中與契丹藏有關的校勘記録除幾個事例之外均來自校正別録本文除了校正別録中的校勘記録之外還對再雕藏的經典逐一進行調查對間或收録在一些經卷卷末的校勘記以及記録在一些經文中的校勘記録進行收集把與契丹藏有關的記録整理出來介紹給大家一校正別録收入在校正別録中的校勘記録共函部除去與契丹藏無關的校勘記録函部與契丹藏有關的校勘記録共有函條記録的具體內容可參考校正別録具體如下決定毗尼經服函須摩提經服函大集經推函大集經第五十九卷虞函般舟三昧經三卷伐函正法華經十卷鳳函普耀經八卷第二卷王函月燈三昧經一卷宋沙門先公譯今十三紙鞠函月燈三昧經一卷宋沙門先公譯國宋藏本二十六紙鞠函佛說彌勒下生經養函佛說彌勒下生成佛經養函佛說申日經敢函六字神呪經才函東方最勝燈王陀羅尼經知函最勝燈王如來經知函須真天子經必函蘇悉地羯羅供養法三卷詩函摩逆經羔函大智度論第四卷作函大智度論第十四卷聖函大智度論第三十一卷建函大寶積經論四卷穀函攝大乘論釋卷第九曰函決定藏論當函寶性當函論第二卷竭函轉識論力函法界無差別論一卷命函國本宋本法界無差別論命函中阿含經卷第十一薄函中阿含經卷第十五薄函雜阿含經第四卷松函雜阿含經第三十四卷川函別譯雜阿含經不函起世經澄函起世因本經取函大樓炭經卷第一映函中本起經卷下映函受歲經容函佛說頻毗娑羅詣佛供養經止函舍衛國王十夢經若函四未曾有經一卷若函本事經第三卷籍函受新歲經竟函護淨經竟函十誦律卷第五攝函根本說一切有部苾芻尼毗那耶卷第二十樂函彌沙塞五分戒本隨函摩訶僧只比丘尼戒本隨函沙彌尼離戒文外函四分比丘尼羯磨一卷傅函目連問戒律中五百輕重事一卷入函鼻奈耶十卷諸函阿毗曇八揵度論卷第六子函阿毗曇八揵度論卷第八子函發智論第八卷孔函集異門足論卷第十四同函阿毗曇毗婆沙論卷第十四分函阿毗達磨大毗婆沙論卷第十四慈函阿毗達磨大毗婆沙論卷第慈函三十二惻函大毗婆沙論卷第六十五弗函大毗婆沙論卷第一百九廉函大毗婆沙論卷第一百九十九逸函大毗婆沙論卷第二百逸函分別功德論第五卷渭函菩薩本緣經卷上觀函雜寶藏經卷第五驚函神州三寶感通録三卷右函辨正論第七卷既函一字頂輪王經第一卷佐函根本說一切有部毗奈耶破僧事卷第十三傾函佛名經三十卷寧晉楚函二卷末校勘記經調查校正別録裏沒有但收録在經卷卷末中的校勘記共有函條都是與契丹藏有關的校勘記録其經名與校勘記録如下佛說灌洗佛形像經傷函此經宋藏題云摩訶剎頭經聖堅譯今按開元録宋藏錯亂故依丹本改為灌洗佛形像經法炬譯又宋藏此經初首即云摩訶剎等乃至二紙經文全是摩訶剎頭經文二經不殊今依丹本爾時佛告摩訶剎頭乃至從是因緣得成佛道等二紙遆之從佛言浴佛形像已下三十一行經文於宋本中本自有之而今仍存佛說摩訶剎頭經傷函此經宋藏即云灌洗佛形像經法炬譯撿尋經文與宋藏中摩訶剎頭經相濫即宋藏錯亂今按丹本此經卻是摩訶剎頭經聖堅譯者今從丹本換其經題及譯者云最勝佛頂陀羅尼淨除業障呪經良函宋藏此經本有呪者與丹鄉二藏不同今檢之宋呪乃是杜行顗譯佛頂尊勝呪耳宋藏錯亂重編於此而脫此中地婆訶羅本所譯者今依諸藏去彼取此云佛頂尊勝陀羅尼經良函宋藏此中經本有真言准丹藏即是地婆訶羅淨除業障陀羅尼今依丹本移安於彼又准丹本安此真言金剛祕密善門陀羅尼經知函與丹本不同佛說菩薩本行經覆函丹藏以此卷為下卷以中為上以下為中今詳始末丹藏錯耳五佛頂三昧陀羅尼經悲函按開元録云一字佛頂輪王經五卷亦云五佛頂或四卷則此四卷本與彼五卷頂輪王經只是一經而分卷有異耳又按目録及音義丹本經皆云五卷無四卷者則此四卷經宜在削去然尋其文相非唯廣略不同往往互有不可取捨處今依鄉本雙存唯識二十論力函丹藏此論有後序三十餘行沙門靖邁制者今檢之彼乃慈恩述記之後序耳非為論本所制故今不取別譯雜阿含經息函自極慢已下十一經皆丹藏所無於大本經中亦無同本異譯者然其文相不異當經前後則丹藏無者脫之耳故此仍之摩登伽經思函此卷第三紙第二十行月離女星之上丹藏有注云脫牛宿校曰下此注者曾未知西域唯用二十七宿凡言脫者言其容有而無彼本不用經無理然何云脫也如孰函文殊師利宿曜經中凡有七段重明宿曜段段唯有二十七宿而無牛宿景風注云唐用二十八宿西國除牛宿以其天主事之斯其證也阿毗曇毗婆沙論規函校正序宋本此卷首云智揵度他心智品第二之六已說體性所以今當說何故名念前世智云云乃至卷末云是說願智方便緣自身者等凡十五紙文其與國本宋本逈異者何耶今檢宋本錯亂此文即是此論前文宋丹則第五十卷國本則五十一卷之全耳而重書為此五十五卷者錯也今依丹本正之國本雖與二本不同但分卷有異耳序則不亂焉集古今佛道論衡星函集古今佛道論衡四卷重校序按此一部四卷之書其第四卷國本與宋本則同唯八紙耳丹本大多至三十四紙非唯多小不同文義亦不相涉又前第三卷國本與宋本則同丹本始終逈異者何耶今進退檢校宋本錯亂失第三卷妄引第四卷為第三卷於第四卷則傍引道士郭行真舍道歸佛之文十余段凡八紙補為一卷國本依宋故同錯耳今詳此一部撰集之體始自漢明帝終至唐高宗歷紀帝代佛道論衡而國本宋本之第三卷凡七條事即唐高宗時事也今於第四卷八紙後所連寫十條之事是高朝大宗時事也然則先後倒錯勢必不然理須正之今依丹本以高祖大宗時十事為第三卷高宗時七事為第四卷而正焉其郭行真舍道歸佛之文并附於尾云守其序三經文中的校勘記録對再雕藏的經典逐一進行調查將經文中與契丹藏有關的校勘記録整理出來發現與契丹藏有關的共有函條其經名校勘記録及具體的校勘內容如下放光般若波羅蜜經重函條歡善功德此間有三十五字重復書准丹本除福不可計量起便入滿法闍丹本佉闍三昧摩訶般若波羅蜜分別品第八十四丹本作分別四諦品摩訶般若波羅蜜經芥函條摩訶般若波羅蜜經習應品第三丹本名為習相應品條與前項同一的類型故省略之光贊般若波羅蜜經鹹河函條平等印丹本云御造印三昧有三昧名入法印丹本云有三昧名善住王亦無已字丹本亦不以空為菩薩也道行般若經淡函條摩訶般若波羅蜜道行經覺品丹覺魔品小品般若波羅蜜經鱗函條摩訶般若波羅蜜經卷第一丹本摩訶上有小品二字塔品第三丹本云寶塔品大寶積經皇始函條爾時復有法施丹本愛敬長者名稱二月八日佛丹本沸星現佛說決定毗尼經服函條令得調伏妙意丹云妙音衆生無少有丹云少為衆生意丹作童子光六十丹云千菩薩得無生忍大方等大集經推有函條淨衆光丹云生自在王菩薩摩訶薩是名六十四丹本云十一種無處訪本頂丹本云項有瘡瘢八月丹本云日乃愈無盡意菩薩經罪函條與解脫異丹本果三昧寶星陀羅尼經殷函條從頂丹項量已下漸備一切智德經伏函條菩薩如是住玄妙地是其屋室宣布丹注諸本此處玄妙地合詞不盡無動地喻文全闕請驗異譯即知脫略等目菩薩所問三昧經戎函條墮樓近菩薩丹本隨樓延菩薩大乘悲分陀利經白函條栴檀善安隱起丹超勢如來智起丹超如來合部金光明經場函條而生疑惑自下五行丹本無爾時下崛多譯補爾時思益梵天所問經及函條分別品第三丹本菩薩正問品第三是菩薩遍行此下丹本為菩薩出過世問品第四解諸法品第四此品丹本無下二十四小爾時下方為歎功德品第五解諸法品第四之餘丹如來五力說品第六五幅世尊何謂大悲下為如來大悲品第七難問品第五丹幻化品第八丹爾時上有菩薩光明品第九爾時問談品第六丹無此品名柔順法忍丹有菩薩授記品第十二十五幅梵天上有薩婆若品第十一談論品第七丹菩薩無二品第十二爾時等行菩薩白佛言菩薩爾時等行菩薩白佛言下丹為名字義品第十三爾時下丹為如來二事品第五爾時仂行品第九丹無此品幅末爾時文殊師利下為得聖道品第十六爾時文殊師利志大乘品第十丹大乘品第十七行道品第十一丹發菩提心品第十八稱歎品第十二丹無此品名詠德品第十三丹無此品名等行品第十四丹無此品名授不退轉天子記品第十五丹師子吼品第十九亦復如是八幅爾時佛告下丹為梵行牢強精進品第二十爾時佛告爾時大迦葉一空味前幅爾時大迦葉下丹本為海喻品第二十一建立品第十六丹天子授記品第二十二諸天歎品第十七丹如來神呪品第二十三囑纍品第十八丹第二十四大方等大雲經請雨品第六十四大函條大音丹本意佛說一切法高王經養函條佛說一切法高王經丹本一名一切法義王經佛說灌洗佛形像經傷函條得成佛道此下三十一行經文丹本所無宋本者有存之不空羂索神變真言經女函條敬禮常丹帝幢德如來不空羂索陀羅尼自在王呪經潔函條呪曰第十四泮吒半丹本無泮吒半音此音中即有下第十五呪呪曰第十五丹本此呪卻在第十四段項與項相同的類型故省略之丹本有注云此呪宋鄉二本本無丹本有此呪為第二十五段呪佛說陀羅尼集經效才函條金剛藏眷屬法印呪品第二丹無第二第十九丹第一條與前項同一的類型一百八遍釘其樹上即著鉢囉梵言丹云病癩尊勝菩薩所問一切諸法入無量門陀羅尼經知函條爾時作佛爾時二下五紙丹藏皆無佛說觀藥王藥上二菩薩經改函條名曰妙丹藏有德字辟菩薩千丹本作才字首菩薩賢劫經罔函條六度無極智慧是六上文第十二幅初六度無極下丹本有注云准標文脫佛興盛度無極智慧報是為六丹本有注云三十二相中舊闕二種文佛說佛名經恃己函條丹某丹作某丹有